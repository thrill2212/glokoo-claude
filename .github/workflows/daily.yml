name: Daily Glooko Scraper

on:
  schedule:
    # Täglich um 7:15 Uhr UTC = 8:15 MEZ (Winter) / 9:15 MESZ (Sommer)
    - cron: '15 7 * * *'
  
  # Manueller Trigger zum Testen
  workflow_dispatch:

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    
    steps:
    # Repository Code laden
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    # Python einrichten
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    # Python-Pakete installieren
    - name: Install Dependencies
      run: |
        pip install playwright requests
        playwright install chromium
        playwright install-deps
    
    # Glooko Dashboard scrapen
    - name: Scrape Glooko Dashboard
      env:
        GLOOKO_EMAIL: ${{ secrets.GLOOKO_EMAIL }}
        GLOOKO_PASSWORD: ${{ secrets.GLOOKO_PASSWORD }}
      run: |
        python glooko_scraper.py
      continue-on-error: true
    
    # Debug-Screenshots hochladen
    - name: Upload Debug Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: debug-screenshots
        path: debug_*.png
        if-no-files-found: ignore
    
    # Daten an Telegram senden
    - name: Send Data to Telegram
      if: success()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python send_to_telegram.py
    
    # Bei Fehler Benachrichtigung senden
    - name: Notify on Failure
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=⚠️ Glooko-Scraping fehlgeschlagen! Bitte GitHub Actions überprüfen."
